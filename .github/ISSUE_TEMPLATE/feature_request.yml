name: 功能建议
description: 提议可验证的新能力或体验改进
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题与使用场景
      description: 当前遇到了什么问题？谁会在什么场景下受益？
      placeholder: 请先描述问题，不要只描述希望增加的按钮或参数。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 说明期望行为、示例命令或工作流变化。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你尝试过哪些现有能力或替代方法？
  - type: dropdown
    id: compatibility
    attributes:
      label: 兼容性影响
      options:
        - 不影响现有行为
        - 可能影响现有行为
        - 不确定
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues，确认没有重复建议。
          required: true
        - label: 我愿意补充示例、测试或文档（如适用）。

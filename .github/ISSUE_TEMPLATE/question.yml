name: 使用问题
description: 询问安装、迁移、命令或排障方法
title: "[Question]: "
labels:
  - question
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标与问题
      description: 你想完成什么？具体卡在哪一步？
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: 已尝试的方法
      description: 请列出查阅过的文档、执行过的命令和关键输出。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 提供 spec-kit-zh 版本、操作系统、Python、AI agent 和安装方式。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issues、README 和排障文档。
          required: true
        - label: 我已移除 Token、凭据、个人路径和其他隐私信息。
          required: true

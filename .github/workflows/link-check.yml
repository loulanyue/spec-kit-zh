# spec-kit-zh repo note: package `specify-cli-zh`, command `specify-zh`.
name: 文档死链检测

on:
  push:
    branches: [main]
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'
  schedule:
    # 每周二 UTC 02:00 (北京时间 10:00) 触发
    - cron: "0 2 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: 检测 Markdown 文档死链
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 运行 Lychee 死链检测
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --exclude-loopback
            --exclude-private
            --exclude-mail
            --exclude "https://img.shields.io"
            --exclude "https://github.com/.*/stargazers"
            --exclude "https://github.com/.*/releases/latest"
            --timeout 30
            --max-retries 3
            --accept 200,204,301,302,403
            '**/*.md'
          fail: false  # 不直接失败，改为创建 Issue 汇报

      - name: 输出检测结果摘要
        run: |
          echo "## 死链检测结果" >> $GITHUB_STEP_SUMMARY
          if [ -f lychee/out.md ]; then
            cat lychee/out.md >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ 未发现死链" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 定时检测失败时创建 Issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[文档维护] 死链检测发现问题 (${today})`,
              labels: ['文档', '死链'],
              body: `## 文档死链检测报告

定时死链检测发现文档中存在失效链接，请及时修复。

**检测时间**: ${today}
**触发方式**: 定时检测（每周二）

请查看 [Actions 运行日志](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) 获取详细的死链列表。

### 修复建议

- 检查链接目标页面是否已迁移或删除
- 更新 GitHub 仓库链接到最新路径
- 对于外部链接，考虑使用 Web Archive 备份链接
- 运行本地检查：\`make link-check\`

cc @loulanyue
`
            });

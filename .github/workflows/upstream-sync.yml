# spec-kit-zh repo note: package `specify-cli-zh`, command `specify-zh`.
name: 上游版本同步检测

on:
  schedule:
    # 每周一 UTC 03:00 (北京时间 11:00) 触发
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      force_check:
        description: '强制检查（即使版本未变更也发 Issue）'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    name: 检查上游 spec-kit 版本
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: 获取上游最新 Release
        id: upstream
        run: |
          # 获取上游 spec-kit 的最新 release tag
          UPSTREAM_LATEST=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/microsoft/spec-kit/releases/latest" \
            | jq -r '.tag_name // "unknown"') || true

          # 如果官方仓库无法访问，尝试备选仓库
          if [ "$UPSTREAM_LATEST" = "unknown" ] || [ -z "$UPSTREAM_LATEST" ]; then
            UPSTREAM_LATEST=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/spec-kit/spec-kit/releases/latest" \
              | jq -r '.tag_name // "unknown"') || true
          fi

          echo "upstream_tag=$UPSTREAM_LATEST" >> "$GITHUB_OUTPUT"
          echo "上游最新版本: $UPSTREAM_LATEST"

      - name: 读取本地跟踪版本
        id: local
        run: |
          # 从 pyproject.toml 读取当前版本
          LOCAL_VERSION=$(grep '^version' pyproject.toml | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "本地版本: $LOCAL_VERSION"

          # 读取上次同步记录（如果存在）
          if [ -f ".upstream-sync-version" ]; then
            LAST_SYNC=$(cat .upstream-sync-version)
          else
            LAST_SYNC="unknown"
          fi
          echo "last_sync=$LAST_SYNC" >> "$GITHUB_OUTPUT"
          echo "上次同步版本: $LAST_SYNC"

      - name: 判断是否需要创建同步 Issue
        id: decision
        run: |
          UPSTREAM="${{ steps.upstream.outputs.upstream_tag }}"
          LAST_SYNC="${{ steps.local.outputs.last_sync }}"
          FORCE="${{ github.event.inputs.force_check }}"

          if [ "$UPSTREAM" = "unknown" ]; then
            echo "⚠️ 无法获取上游版本，跳过"
            echo "should_create_issue=false" >> "$GITHUB_OUTPUT"
          elif [ "$UPSTREAM" != "$LAST_SYNC" ] || [ "$FORCE" = "true" ]; then
            echo "🆕 发现新版本或强制检查：$LAST_SYNC → $UPSTREAM"
            echo "should_create_issue=true" >> "$GITHUB_OUTPUT"
          else
            echo "✅ 版本未变更（$UPSTREAM），无需同步"
            echo "should_create_issue=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建同步提醒 Issue
        if: steps.decision.outputs.should_create_issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const upstreamTag = '${{ steps.upstream.outputs.upstream_tag }}';
            const lastSync = '${{ steps.local.outputs.last_sync }}';
            const localVersion = '${{ steps.local.outputs.local_version }}';
            const today = new Date().toISOString().split('T')[0];

            // 检查是否已有相同标题的未关闭 Issue
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: '上游同步'
            });

            const alreadyExists = existingIssues.some(issue =>
              issue.title.includes(upstreamTag)
            );

            if (alreadyExists) {
              console.log('已存在该版本的同步 Issue，跳过创建');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[上游同步] 检测到上游新版本 ${upstreamTag} (${today})`,
              labels: ['上游同步'],
              body: `## 上游版本变更提醒

| 信息 | 内容 |
|------|------|
| 上游仓库 | [spec-kit/spec-kit](https://github.com/microsoft/spec-kit) |
| 上游最新版本 | \`${upstreamTag}\` |
| 上次同步版本 | \`${lastSync}\` |
| 本地当前版本 | \`${localVersion}\` |
| 检测时间 | ${today} |

## 同步检查清单

请参照 [上游同步指南](../docs/upstream-sync.md) 完成以下步骤：

- [ ] 对比上游 Changelog，识别功能性变更
- [ ] 评估变更对中文本地化内容的影响
- [ ] cherry-pick 功能性变更（忽略纯英文文案变更）
- [ ] 更新 \`pyproject.toml\` 版本号
- [ ] 更新 \`CHANGELOG.md\`
- [ ] 更新 \`.upstream-sync-version\` 记录文件
- [ ] 确认所有测试通过：\`make smoke\`

## 版本跟踪规则

- **大版本**：跟随上游（如上游 v2.0 → 本仓库 v2.0.x）
- **中/小版本**：本仓库独立递增（中文化改进、Bug 修复等）
- **冲突优先级**：中文化内容 > 上游原文

cc @loulanyue
`
            });
            console.log(`✅ 已创建同步 Issue: ${upstreamTag}`);

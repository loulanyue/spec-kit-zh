# spec-kit-zh repo note: package `specify-cli-zh`, command `specify-zh`.
name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install locked dependencies
        run: uv sync --locked --extra test --python 3.11
      - name: Ruff Check
        run: uv run ruff check .
      - name: Ruff Format Check
        run: uv run ruff format --check .

  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install locked dependencies
        run: uv sync --locked --extra test --python ${{ matrix.python-version }}
      - name: Run Pytest
        run: uv run pytest tests/ -v --tb=short

  smoke:
    name: Smoke Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install locked dependencies
        run: uv sync --locked --extra test --python 3.11
      - name: Check installed CLI
        run: uv run specify-zh version
      - name: Run Smoke Tests
        run: uv run pytest tests/test_smoke.py -v

  brand-guard:
    name: Brand Identity Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check README against raw commands
        run: |
          if grep -q "pip install specify-cli[^[-]" README.md; then
            echo "Error: Found obsolete 'specify-cli' pip install string."
            exit 1
          fi
          if grep -q "uv tool install specify-cli[^[-]" README.md; then
            echo "Error: Found obsolete 'specify-cli' uv tool install string."
            exit 1
          fi
      - name: Assert pyproject.toml scripts
        run: |
          if ! grep -q 'specify-zh =' pyproject.toml; then
            echo "Error: pyproject.toml is missing the 'specify-zh' script entry."
            exit 1
          fi
      - name: Assert CHANGELOG
        run: |
          if [ ! -s CHANGELOG.md ]; then
            echo "Error: CHANGELOG.md is empty."
            exit 1
          fi
      - name: Assert version consistency
        run: |
          toml_version=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          echo "pyproject.toml version: $toml_version"
          if [ -z "$toml_version" ]; then
            echo "Error: Could not parse version from pyproject.toml."
            exit 1
          fi
          if ! grep -q "\[$toml_version\]" CHANGELOG.md; then
            echo "Error: CHANGELOG.md is missing an entry for version [$toml_version]."
            exit 1
          fi
